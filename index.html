<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Live</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.13.5/controls.min.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
left:-200px;
top:-200px;
width:600px;
height:600px;
background:#00ff66;
filter:blur(180px);
opacity:.15;
z-index:-1;
}

body::after{
content:"";
position:fixed;
right:-200px;
bottom:-200px;
width:600px;
height:600px;
background:#00ff99;
filter:blur(180px);
opacity:.15;
z-index:-1;
}

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
border-bottom:2px solid #00ff66;
}

.logo{
font-size:30px;
font-weight:bold;
color:#00ff66;
}

.live{
background:red;
padding:8px 18px;
border-radius:50px;
font-size:14px;
font-weight:bold;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{transform:scale(1.1);}
}

.container{
width:95%;
max-width:1200px;
margin:30px auto;
}

.video-container{
border:2px solid #00ff66;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,255,100,.3);
}

video{
width:100%;
height:auto;
background:black;
}

.footer{
text-align:center;
padding:25px;
color:#888;
font-size:14px;
}
</style>

</head>

<body>

<div class="header">
<div class="logo">⚽ FOOTBALL LIVE</div>
<div class="live">🔴 LIVE</div>
</div>

<div class="container">

<div class="video-container">

<div data-shaka-player-container
     data-shaka-player-cast-receiver-id=""
     style="width:100%;">

<video
id="video"
data-shaka-player
autoplay
controls
playsinline>
</video>

</div>

</div>

</div>

<div class="footer">
HD Streaming • Adaptive Bitrate • Fullscreen • Quality Selector
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.13.5/shaka-player.compiled.js"></script>

<script>

async function init(){

if(!shaka.Player.isBrowserSupported()){

alert("Browser not supported");

return;

}

const video=document.getElementById("video");

const player=new shaka.Player(video);

window.player=player;

try{

await player.load("https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/fifa_ppv1/default/index.mpd");

console.log("Video Loaded");

}catch(error){

console.error(error);

alert("Unable to load stream");

}

}

document.addEventListener("DOMContentLoaded",init);

</script>

</body>
</html>
